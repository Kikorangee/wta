<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WTA Card Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
:root{--bg:#0d0f12;--panel:#141720;--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#64748b;--accent:#38bdf8;--red:#f87171;--green:#34d399;--purple:#a78bfa;--sidebar:#4d5b67;--input:rgba(255,255,255,0.05);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:grid;grid-template-columns:260px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden;}
header{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;}
.brand{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
#fileStatus{font-size:12px;color:var(--muted);flex:1;text-align:center;}
.btn{padding:8px 16px;border-radius:8px;font:600 13px 'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--input);color:var(--text);transition:all .15s;}
.btn:hover{background:rgba(255,255,255,0.1);}
.btn.primary{background:var(--accent);color:#000;border-color:transparent;}
.btn.primary:hover{background:#7dd3fc;}
.btn.export{background:rgba(52,211,153,0.15);color:var(--green);border-color:rgba(52,211,153,0.3);}
.btn.export:hover{background:rgba(52,211,153,0.25);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
aside{background:var(--sidebar);border-right:1px solid rgba(0,0,0,0.25);overflow-y:auto;padding:12px 0;}
.aside-label{padding:8px 16px;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);}
.nav-item{padding:9px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,0.12);color:#fff;border-left-color:var(--accent);}
.nav-count{font-size:10px;font-weight:700;background:rgba(255,255,255,0.12);padding:2px 7px;border-radius:10px;}
main{overflow-y:auto;padding:24px;}
/* Upload zone */
#uploadZone{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;}
#uploadZone h2{font-size:20px;font-weight:700;}
#uploadZone p{font-size:13px;color:var(--muted);max-width:300px;line-height:1.6;}
.drop-box{border:2px dashed rgba(255,255,255,0.15);border-radius:14px;padding:40px 60px;cursor:pointer;transition:all .2s;}
.drop-box:hover,.drop-box.over{border-color:var(--accent);background:rgba(56,189,248,0.05);}
.drop-box p{font-size:13px;color:var(--muted);}
/* Editor */
#editorArea{display:none;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.view-title{font-size:18px;font-weight:700;}
input[type=text].search{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--input);color:var(--text);font:13px 'DM Sans',sans-serif;outline:none;width:220px;}
input[type=text].search:focus{border-color:var(--accent);}
/* Stats */
.stats{display:flex;gap:12px;margin-bottom:20px;}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 18px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;color:var(--accent);}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
/* Cards */
.card-row{background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.card-head{display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;padding:12px 14px;cursor:pointer;transition:background .15s;}
.card-head:hover{background:rgba(255,255,255,0.03);}
.card-row.open .card-head{background:rgba(56,189,248,0.06);border-bottom:1px solid rgba(56,189,248,0.15);}
.thumb{width:44px;height:44px;border-radius:6px;background:#1e2130;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.card-info-name{font-size:14px;font-weight:700;}
.card-tags{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}
.tag-cat{background:rgba(56,189,248,0.1);color:var(--accent);}
.tag-pdf{background:rgba(248,113,113,0.12);color:var(--red);}
.tag-vid{background:rgba(167,139,250,0.12);color:var(--purple);}
.tag-tip{background:rgba(52,211,153,0.1);color:var(--green);}
.tag-notip{background:rgba(255,255,255,0.05);color:var(--muted);}
.edit-icon{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.edit-icon:hover{background:rgba(56,189,248,0.1);color:var(--accent);border-color:rgba(56,189,248,0.3);}
/* Inline editor */
.card-editor{display:none;padding:16px;background:rgba(56,189,248,0.03);}
.card-row.open .card-editor{display:grid;gap:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:grid;gap:5px;}
.field label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.field input,.field textarea{padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--input);color:var(--text);font:13px 'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{min-height:80px;resize:vertical;line-height:1.5;}
.editor-btns{display:flex;justify-content:flex-end;gap:8px;}
/* Page text panel */
#pagePanel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;}
.section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:14px;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
/* Toast */
#toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:var(--green);font:600 13px 'DM Sans',sans-serif;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;transform:translateY(0);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="brand"><div class="brand-dot"></div>WTA Card Manager</div>
  <span id="fileStatus">No file loaded</span>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn" id="loadBtn">📂 Load index.html</button>
    <button class="btn export" id="exportBtn" disabled>⬇ Export HTML</button>
  </div>
</header>

<aside>
  <div class="aside-label">Navigation</div>
  <div class="nav-item active" id="navAll" onclick="showCards('All')">All Cards <span class="nav-count" id="countAll">0</span></div>
  <div class="aside-label" style="margin-top:8px;">Categories</div>
  <div id="catNav"></div>
  <div class="aside-label" style="margin-top:8px;">Page Text</div>
  <div class="nav-item" id="navPage" onclick="showPagePanel()">✏️ Edit Page Text</div>
</aside>

<main>
  <!-- Upload zone -->
  <div id="uploadZone">
    <div style="font-size:48px;opacity:.2;">📄</div>
    <h2>Load your index.html</h2>
    <p>Click "Load index.html" above, or drag and drop the file anywhere on this page.</p>
    <div class="drop-box" id="dropBox"><p>Or drop file here</p></div>
  </div>

  <!-- Editor -->
  <div id="editorArea">
    <!-- Page text panel -->
    <div id="pagePanel">
      <div class="section-label">Page Text Editor</div>
      <div class="field-row">
        <div class="field"><label>Browser Tab Title</label><input type="text" id="pt-title"></div>
        <div class="field"><label>Main H1 Heading</label><input type="text" id="pt-h1"></div>
      </div>
      <div class="field"><label>Intro Line (below heading)</label><input type="text" id="pt-intro"></div>
      <hr class="divider">
      <div class="section-label">Hero Slide 1</div>
      <div class="field-row">
        <div class="field"><label>Eyebrow</label><input type="text" id="pt-e1"></div>
        <div class="field"><label>Title</label><input type="text" id="pt-t1"></div>
      </div>
      <div class="field"><label>Description</label><input type="text" id="pt-d1"></div>
      <hr class="divider">
      <div class="section-label">Hero Slide 2</div>
      <div class="field-row">
        <div class="field"><label>Eyebrow</label><input type="text" id="pt-e2"></div>
        <div class="field"><label>Title</label><input type="text" id="pt-t2"></div>
      </div>
      <div class="field"><label>Description</label><input type="text" id="pt-d2"></div>
      <hr class="divider">
      <div class="section-label">Hero Slide 3</div>
      <div class="field-row">
        <div class="field"><label>Eyebrow</label><input type="text" id="pt-e3"></div>
        <div class="field"><label>Title</label><input type="text" id="pt-t3"></div>
      </div>
      <div class="field"><label>Description</label><input type="text" id="pt-d3"></div>
      <hr class="divider">
      <div class="editor-btns">
        <button class="btn" onclick="hidePagePanel()">Cancel</button>
        <button class="btn primary" onclick="savePageText()">Save Page Text</button>
      </div>
    </div>

    <!-- Card list -->
    <div id="cardView">
      <div class="top-bar">
        <div class="view-title" id="viewTitle">All Cards</div>
        <input type="text" class="search" id="searchInput" placeholder="Search cards..." oninput="renderCards()">
      </div>
      <div class="stats" id="statsBar"></div>
      <div id="cardList"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ── State ──
let html = '', cards = [], tips = {}, openIdx = null, activeView = 'All';
const TIPS_KEY = 'training-hub-tooltip-overrides-v1';

// ── Load button ──
document.getElementById('loadBtn').addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.html';
  inp.onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
  inp.click();
});

// ── Drag & drop ──
const dropBox = document.getElementById('dropBox');
['dragover','dragenter'].forEach(ev => document.body.addEventListener(ev, e => { e.preventDefault(); dropBox.classList.add('over'); }));
['dragleave','dragend'].forEach(ev => document.body.addEventListener(ev, () => dropBox.classList.remove('over')));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  dropBox.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
dropBox.addEventListener('click', () => document.getElementById('loadBtn').click());

// ── Load file ──
function loadFile(file) {
  const r = new FileReader();
  r.onload = e => {
    html = e.target.result;
    document.getElementById('fileStatus').textContent = '✓ ' + file.name;
    document.getElementById('exportBtn').disabled = false;
    try { tips = JSON.parse(localStorage.getItem(TIPS_KEY) || '{}'); } catch(_) { tips = {}; }
    parseCards();
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('editorArea').style.display = 'block';
    showCards('All');
    toast(cards.length + ' cards loaded');
  };
  r.onerror = () => toast('Error reading file');
  r.readAsText(file);
}

// ── Parse ──
function parseCards() {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  cards = Array.from(doc.querySelectorAll('.card')).map((el, i) => {
    const title    = el.dataset.title || '';
    const category = (el.dataset.category || '').replace(/&amp;/g,'&');
    const isPdf    = el.classList.contains('is-pdf');
    const vimeoId  = el.dataset.vimeoId || '';
    const pdfUrl   = el.dataset.pdf || '';
    const poster   = el.querySelector('.poster');
    let   thumb    = '';
    if (poster) { const m = (poster.getAttribute('style')||'').match(/url\(['"]?([^'")\s,]+)/); if (m) thumb = m[1]; }
    const key = [vimeoId ? 'video' : (isPdf ? 'pdf' : 'card'), vimeoId, title.trim().toLowerCase(), category.toLowerCase()].join('::');
    return { i, title, category, isPdf, vimeoId, pdfUrl, thumb, key };
  });
  buildCatNav();
}

// ── Category nav ──
function buildCatNav() {
  const cats = {};
  cards.forEach(c => { cats[c.category] = (cats[c.category]||0)+1; });
  document.getElementById('countAll').textContent = cards.length;
  const nav = document.getElementById('catNav');
  nav.innerHTML = '';
  Object.entries(cats).sort(([a],[b]) => a.localeCompare(b)).forEach(([cat, n]) => {
    const d = document.createElement('div');
    d.className = 'nav-item';
    d.dataset.cat = cat;
    d.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${cat}</span><span class="nav-count">${n}</span>`;
    d.onclick = () => showCards(cat);
    nav.appendChild(d);
  });
}

// ── Show cards view ──
function showCards(cat) {
  activeView = cat;
  document.getElementById('pagePanel').style.display = 'none';
  document.getElementById('cardView').style.display = 'block';
  document.getElementById('navPage').classList.remove('active');
  document.getElementById('navAll').classList.toggle('active', cat === 'All');
  document.querySelectorAll('#catNav .nav-item').forEach(el => el.classList.toggle('active', el.dataset.cat === cat));
  document.getElementById('viewTitle').textContent = cat === 'All' ? 'All Cards' : cat;
  document.getElementById('searchInput').value = '';
  renderCards();
}

// ── Render cards ──
function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const visible = cards.filter(c =>
    (activeView === 'All' || c.category === activeView) &&
    (!q || c.title.toLowerCase().includes(q) || c.category.toLowerCase().includes(q))
  );

  // Stats
  const pdfs = visible.filter(c=>c.isPdf).length;
  const vids = visible.length - pdfs;
  const tipped = visible.filter(c=>tips[c.key]).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-n">${visible.length}</div><div class="stat-l">Cards</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--purple)">${vids}</div><div class="stat-l">Videos</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red)">${pdfs}</div><div class="stat-l">PDFs</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${tipped}</div><div class="stat-l">Tooltips</div></div>
  `;

  const list = document.getElementById('cardList');
  list.innerHTML = '';
  if (!visible.length) { list.innerHTML = '<p style="color:var(--muted);padding:20px;text-align:center;">No cards found</p>'; return; }

  visible.forEach(card => {
    const hasTip = !!tips[card.key];
    const tip = tips[card.key] || '';
    const isOpen = openIdx === card.i;

    const row = document.createElement('div');
    row.className = 'card-row' + (isOpen ? ' open' : '');

    // Thumb
    let thumbHtml = card.isPdf ? '📄' : '▶';
    if (card.thumb && !card.thumb.startsWith('data:')) thumbHtml = `<img src="${card.thumb}" onerror="this.parentElement.textContent='${card.isPdf?'📄':'▶'}'">`;

    row.innerHTML = `
      <div class="card-head" onclick="toggleCard(${card.i})">
        <div class="thumb">${thumbHtml}</div>
        <div>
          <div class="card-info-name">${card.title || '<em style="color:var(--muted)">Untitled</em>'}</div>
          <div class="card-tags">
            <span class="tag tag-cat">${card.category}</span>
            <span class="tag ${card.isPdf ? 'tag-pdf':'tag-vid'}">${card.isPdf?'PDF':'Video'}</span>
            <span class="tag ${hasTip?'tag-tip':'tag-notip'}">${hasTip?'✓ tooltip':'no tooltip'}</span>
          </div>
        </div>
        <button class="edit-icon" onclick="event.stopPropagation();toggleCard(${card.i})">✏️</button>
      </div>
      <div class="card-editor">
        <div class="field-row">
          <div class="field"><label>Card Title</label><input type="text" id="f-title-${card.i}" value="${esc(card.title)}"></div>
          <div class="field"><label>Category</label><input type="text" id="f-cat-${card.i}" value="${esc(card.category)}"></div>
        </div>
        <div class="field"><label>Tooltip / Description (shown on hover)</label><textarea id="f-tip-${card.i}">${esc(tip)}</textarea></div>
        <div class="editor-btns">
          <button class="btn" onclick="toggleCard(${card.i})">Cancel</button>
          <button class="btn primary" onclick="saveCard(${card.i})">Save</button>
        </div>
      </div>
    `;
    list.appendChild(row);
  });
}

// ── Toggle card editor ──
function toggleCard(i) {
  openIdx = openIdx === i ? null : i;
  renderCards();
  if (openIdx !== null) {
    setTimeout(() => {
      const el = document.getElementById('f-title-' + i);
      if (el) { el.focus(); el.select(); }
    }, 50);
  }
}

// ── Save card ──
function saveCard(i) {
  const card = cards.find(c => c.i === i);
  if (!card) return;
  const newTitle = document.getElementById('f-title-'+i)?.value.trim() || card.title;
  const newCat   = document.getElementById('f-cat-'+i)?.value.trim()   || card.category;
  const newTip   = document.getElementById('f-tip-'+i)?.value.trim()   || '';

  card.title    = newTitle;
  card.category = newCat;

  if (newTip) tips[card.key] = newTip; else delete tips[card.key];
  try { localStorage.setItem(TIPS_KEY, JSON.stringify(tips)); } catch(_){}

  // Patch HTML
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const els = doc.querySelectorAll('.card');
  if (els[i]) {
    els[i].dataset.title    = newTitle;
    els[i].dataset.category = newCat;
    const lbl = els[i].querySelector('.card-title-label');
    if (lbl) lbl.textContent = newTitle;
  }
  html = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;

  openIdx = null;
  buildCatNav();
  renderCards();
  toast('Saved: ' + newTitle);
}

// ── Page text panel ──
function showPagePanel() {
  if (!html) { toast('Load a file first'); return; }
  document.getElementById('pagePanel').style.display = 'block';
  document.getElementById('cardView').style.display = 'none';
  document.getElementById('navPage').classList.add('active');
  document.getElementById('navAll').classList.remove('active');
  document.querySelectorAll('#catNav .nav-item').forEach(el => el.classList.remove('active'));

  const doc = new DOMParser().parseFromString(html, 'text/html');
  const v = (sel) => doc.querySelector(sel)?.textContent.trim() || '';
  const va = (list, i) => list[i]?.textContent.trim() || '';
  const ey = doc.querySelectorAll('.hero-eyebrow');
  const ht = doc.querySelectorAll('.hero-title');
  const hd = doc.querySelectorAll('.hero-desc');

  document.getElementById('pt-title').value = v('title');
  document.getElementById('pt-h1').value    = v('h1');
  document.getElementById('pt-intro').value = v('.intro');
  document.getElementById('pt-e1').value = va(ey,0); document.getElementById('pt-t1').value = va(ht,0); document.getElementById('pt-d1').value = va(hd,0);
  document.getElementById('pt-e2').value = va(ey,1); document.getElementById('pt-t2').value = va(ht,1); document.getElementById('pt-d2').value = va(hd,1);
  document.getElementById('pt-e3').value = va(ey,2); document.getElementById('pt-t3').value = va(ht,2); document.getElementById('pt-d3').value = va(hd,2);
}

function hidePagePanel() {
  showCards(activeView);
}

function savePageText() {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const s = (sel, id) => { const v=document.getElementById(id).value.trim(); if(v&&doc.querySelector(sel)) doc.querySelector(sel).textContent=v; };
  const si = (list, i, id) => { const v=document.getElementById(id).value.trim(); if(v&&list[i]) list[i].textContent=v; };
  s('title','pt-title'); s('h1','pt-h1'); s('.intro','pt-intro');
  const ey=doc.querySelectorAll('.hero-eyebrow'), ht=doc.querySelectorAll('.hero-title'), hd=doc.querySelectorAll('.hero-desc');
  si(ey,0,'pt-e1'); si(ht,0,'pt-t1'); si(hd,0,'pt-d1');
  si(ey,1,'pt-e2'); si(ht,1,'pt-t2'); si(hd,1,'pt-d2');
  si(ey,2,'pt-e3'); si(ht,2,'pt-t3'); si(hd,2,'pt-d3');
  html = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
  toast('Page text saved ✓');
  hidePagePanel();
}

// ── Export ──
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!html) return;
  const script = `<script>try{localStorage.setItem('${TIPS_KEY}',JSON.stringify(${JSON.stringify(tips)}))}catch(e){}<\/script>`;
  const out = html.replace('</body>', script + '\n</body>');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([out], {type:'text/html'}));
  a.download = 'index.html';
  a.click();
  toast('Exported ✓');
});

// ── Helpers ──
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
</script>
</body>
</html>
